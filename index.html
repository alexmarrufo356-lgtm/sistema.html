<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Admin Ventas</h1>
        <div id="menu-superior">
            <button onclick="mostrar('formulario')">Inventario</button>
            <button onclick="mostrar('ventas')">Ventas</button>
            <button onclick="mostrar('facturas')">Facturas</button>
        </div>
    </nav>
    
    <main style="display: flex; gap: 20px; padding: 20px;">
        <div style="flex: 2;">
            <section id="formulario">
                <h3>Inventario</h3>
                <input type="text" id="codigo" placeholder="Código">
                <input type="text" id="nombre" placeholder="Nombre">
                <input type="text" id="marca" placeholder="Marca">
                <input type="number" id="precio" placeholder="Precio ($)">
                <input type="number" id="stock" placeholder="Stock">
                <button id="btnGuardar">Guardar Producto</button>
                <table id="tabla-inventario">
                    <thead><tr><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </section>

            <section id="ventas" style="display:none;">
                <h3>Nueva Venta</h3>
                <select id="select-productos"></select>
                <button onclick="agregarAVenta()">Agregar a Venta</button>
                <table class="tabla-venta">
                    <thead><tr><th>Producto</th><th>Precio</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-venta"></tbody>
                </table>
                <button onclick="procesarVenta()" style="background:green; color:white; padding:10px; margin-top:10px;">Finalizar Venta</button>
            </section>

            <section id="facturas" style="display:none;">
                <h3>Facturas</h3>
                <div id="contenedor-factura" style="padding:20px; border:1px solid #ccc;"></div>
                <button onclick="window.print()" style="margin-top:10px;">Imprimir Factura</button>
            </section>
        </div>
    </main>

    <script type="module" src="script.js"></script>
    <script>
        function mostrar(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
