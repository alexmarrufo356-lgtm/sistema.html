<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><h1>Admin Ventas</h1></nav>
    
    <main>
        <!-- Formulario para agregar mercancía -->
        <section id="formulario">
            <h3>Agregar Nueva Mercancía</h3>
            <input type="text" id="codigo" placeholder="Código">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="marca" placeholder="Marca">
            <input type="number" id="precio" placeholder="Precio ($)">
            <input type="number" id="stock" placeholder="Stock">
            <button id="btnGuardar">Guardar en Inventario</button>
        </section>
    </main>

    <!-- Cargamos el script con tipo módulo para que funcione la conexión -->
    <script type="module" src="script.js"></script>
</body>
</html>
